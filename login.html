<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      :root {
        --blue-color: #0251ff;
        --dark-blue-color: #003bb5;
        --green-color: hsl(142, 43%, 54%);
        --red-color: hsl(0, 64%, 52%);
        --black-color: #666;
        --btn-padding: 8px 10px;
        --inner-setion-margin: 30px;
      }

      html {
        scroll-behavior: smooth;
        scrollbar-width: normal;
      }

      *,
      ::after,
      ::before {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      li {
        list-style: none;
      }

      a {
        text-decoration: none;
        color: var(--blue-color);
      }

      body {
        height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.5;
        background-color: #fafafa;
      }

      /* --------- HEADER ---------- */

      header {
        top: 0;
        left: 0;
        width: 100%;
        background-color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.1);
        padding: 5px 30px;
      }

      .register-btn {
        background-color: var(--blue-color);
        color: white;
        padding: var(--btn-padding);
        border-style: none;
        border-radius: 20px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .logo li a {
        font-size: 24px;
        color: var(--blue-color);
        font-weight: bold;
      }

      /* ------ LANGUAGE SELECT ------ */

      .right-header {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      /* Styling für das Select */
      .right-header select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: white;
        cursor: pointer;
        font-size: 16px;
        color: #333;
      }

      select:focus {
        outline: none;
        border-color: #0251ff;
      }

      /* --------- LOGIN-FORM ---------- */
      form {
        display: flex;
        flex-direction: column;
        margin: 50px auto;
        max-width: 650px;
        gap: 20px;
        padding: 30px;
        border-style: none;
        border-radius: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        background-color: white;
      }

      .form-section {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .form-button-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        gap: 10px;
      }

      .login-btn {
        background-color: var(--blue-color);
        color: white;
        padding: var(--btn-padding);
        border-style: none;
        border-radius: 20px;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .login-btn:hover,
      .register-btn:hover {
        background-color: var(--dark-blue-color);
      }

      input {
        border-radius: 6px;
        border-style: solid;
        border-width: 2px;
        padding: 7px 10px;
      }
      .password-section {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .password-section input {
        flex-grow: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <li><a href="index.html">cryptostack</a></li>
      </div>
      <div class="right-header">
        <a href="regsiter.html">
          <button class="register-btn">Registerieren</button>
        </a>
      </div>
    </header>

    <form method="post" action="/submit-form">
      <h1>Bei Cryptostack anmelden</h1>
      <div class="form-section">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-section">
        <label for="password">Passwort</label>
        <div class="password-section">
          <input type="password" id="password" name="password" required />
          <i
            class="fa-regular fa-eye"
            id="togglePassword"
            style="cursor: pointer"
          ></i>
        </div>
        <a href="#">Passwort vergessen?</a>
      </div>

      <div class="form-button-section">
        <button class="login-btn">Einloggen</button>
        <div>
          Sie haben noch kein Account? <a href="regsiter.html">Registerieren</a>
        </div>
      </div>
    </form>

    <script>
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordInput.setAttribute("type", type);

        togglePassword.classList.toggle("fa-eye");
        togglePassword.classList.toggle("fa-eye-slash");
      });
    </script>
  </body>
</html>
